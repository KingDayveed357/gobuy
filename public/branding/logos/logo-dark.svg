<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 64" role="img" aria-label="Quintessential Mart">
  <!-- Horizontal lockup — dark backgrounds. Mark switches to white so it never
       muddies on the ink ground; the tail keeps the Signal-Blue accent. -->
  <g transform="translate(2 4)">
    <circle cx="26" cy="28" r="16" fill="none" stroke="#FFFFFF" stroke-width="7.5"/>
    <path d="M34 36 51 53" stroke="#5B87FF" stroke-width="7.5" stroke-linecap="round"/>
  </g>
  <text x="74" y="42" font-family="'Clash Display','Hanken Grotesk','Nunito Sans',system-ui,-apple-system,sans-serif"
        font-size="30" letter-spacing="-0.6">
    <tspan fill="#F5F6FA" font-weight="700">Quintessential</tspan><tspan fill="#9AA1B8" font-weight="500"> Mart</tspan>
  </text>
</svg>
