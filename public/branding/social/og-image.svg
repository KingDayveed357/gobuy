<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Quintessential Mart">
  <!-- Master for the 1200x630 Open Graph / social share image. Export to PNG
       (og-image.png) — SVG isn't honoured by most social scrapers. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12162E"/>
      <stop offset="1" stop-color="#0B0E1F"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- faint gold hairline framing -->
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="none" stroke="#E0A83D" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- Mark -->
  <g transform="translate(96 232) scale(2.7)">
    <circle cx="28" cy="28" r="16" fill="none" stroke="#FFFFFF" stroke-width="7.5"/>
    <path d="M34 36 51 53" stroke="#5B87FF" stroke-width="7.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="'Clash Display','Hanken Grotesk','Nunito Sans',system-ui,sans-serif">
    <text x="300" y="300" font-size="76" font-weight="700" letter-spacing="-2" fill="#F5F6FA">Quintessential<tspan fill="#9AA1B8" font-weight="500"> Mart</tspan></text>
    <text x="302" y="352" font-size="30" font-weight="500" letter-spacing="0.5" fill="#C7CCDD">Premium commerce, delivered.</text>
  </g>
  <text x="300" y="410" font-family="system-ui,sans-serif" font-size="22" letter-spacing="3" fill="#E0A83D" font-weight="600">QUINTESSENTIALMART.COM</text>
</svg>
